spring.application.name=grievance
server.port=8083

spring.datasource.url=jdbc:mysql://grievance-db-azure.mysql.database.azure.com:3306/grievance_db?createDatabaseIfNotExist=true&useSSL=true&requireSSL=false
spring.datasource.username=grievance_admin
spring.datasource.password=admin@123

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT — must be Base64-encoded, min 256 bits
jwt.secret=Y2l2aWNjb25uZWN0LXNlY3JldC1rZXktZ292ZXJubWVudC1vZi1rYXJuYXRha2EtMjAyNA==
jwt.expiration=86400000

# Mail (configure SMTP_USER / SMTP_PASS env vars before Phase 4)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply@civicconnect.kar.gov.in}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true